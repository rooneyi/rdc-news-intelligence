name: AI Service (FastAPI)

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  deploy-ai-service:
    name: Deploy FastAPI AI Service to VPS
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout du code
      # ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: repo

      # ─────────────────────────────────────────────
      # 2. Préparation du paquet de déploiement
      #    Exclusions : fichiers lourds déjà présents
      #    sur le VPS (models_cache, data, .env, venv)
      # ─────────────────────────────────────────────
      - name: Prepare deployment package
        run: |
          cd repo/ai-service
          tar \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='.env_file' \
            --exclude='models_cache' \
            --exclude='data' \
            --exclude='docs' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='*.log' \
            -czf /tmp/ai-service-deploy-${{ inputs.version }}.tar.gz .
          echo "✓ Package: $(du -sh /tmp/ai-service-deploy-${{ inputs.version }}.tar.gz | cut -f1)"

      # ─────────────────────────────────────────────
      # 3. SSH Agent
      # ─────────────────────────────────────────────
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ─────────────────────────────────────────────
      # 4. Copie du paquet sur le VPS
      # ─────────────────────────────────────────────
      - name: Copy release package to VPS
        run: |
          scp \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.SSH_PORT }} \
            /tmp/ai-service-deploy-${{ inputs.version }}.tar.gz \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/ai-service-deploy-${{ inputs.version }}.tar.gz

      # ─────────────────────────────────────────────
      # 5. Déploiement sur le VPS
      #
      #    Le directory existe déjà :
      #    /home/rooney/web/rooney-rdc/
      #    On extrait le code directement dedans,
      #    on installe les dépendances et on redémarre.
      # ─────────────────────────────────────────────
      - name: Deploy release on VPS
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'bash -s' <<'EOF2'
          set -e

          DEPLOY_PATH="${{ secrets.AI_DEPLOY_PATH }}"
          VERSION="${{ inputs.version }}"
          VENV_DIR="$DEPLOY_PATH/venv"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  RDC AI Service — Deploy v$VERSION"
          echo "  Target: $DEPLOY_PATH"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # ── Extraction du code dans le dossier existant ──
          # --overwrite remplace les fichiers existants sans supprimer
          # les fichiers VPS-only (models_cache, data, .env, venv)
          tar -xzf "/tmp/ai-service-deploy-$VERSION.tar.gz" \
              -C "$DEPLOY_PATH" \
              --overwrite
          rm -f "/tmp/ai-service-deploy-$VERSION.tar.gz"
          echo "✓ Code extracted into $DEPLOY_PATH"

          # ── Installation / mise à jour des dépendances Python ──
          if [ ! -d "$VENV_DIR" ]; then
            python3 -m venv "$VENV_DIR"
            echo "✓ Virtual environment created"
          fi

          "$VENV_DIR/bin/pip" install --upgrade pip --quiet
          "$VENV_DIR/bin/pip" install -r "$DEPLOY_PATH/requirements.txt" --quiet
          echo "✓ Dependencies up to date"

          # ── Redémarrage du service ──
          if systemctl is-active --quiet rdc-ai-service 2>/dev/null; then
            sudo systemctl restart rdc-ai-service
            echo "✓ systemd service 'rdc-ai-service' restarted"
          else
            # Fallback : kill l'ancienne instance uvicorn et relance
            pkill -f "uvicorn app.main:app" 2>/dev/null || true
            sleep 2
            cd "$DEPLOY_PATH"
            nohup "$VENV_DIR/bin/uvicorn" app.main:app \
              --host 0.0.0.0 \
              --port 8000 \
              --workers 2 \
              >> "$DEPLOY_PATH/uvicorn.log" 2>&1 &
            echo "✓ uvicorn restarted (pid: $!)"
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ Deployment successful: v$VERSION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          EOF2

      # ─────────────────────────────────────────────
      # 6. Health Check
      # ─────────────────────────────────────────────
      - name: Health check
        continue-on-error: true
        run: |
          sleep 8
          HEALTH_URL="http://${{ secrets.SSH_HOST }}:8000/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠ Health check returned HTTP $HTTP_CODE"
            echo "  curl $HEALTH_URL"
          fi

      # ─────────────────────────────────────────────
      # 7. Résumé
      # ─────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo ""
          echo "╔════════════════════════════════════════╗"
          echo "║     RDC AI Service — Deployment Info   ║"
          echo "╠════════════════════════════════════════╣"
          echo "║  Host    : ${{ secrets.SSH_HOST }}"
          echo "║  Version : ${{ inputs.version }}"
          echo "║  Path    : ${{ secrets.AI_DEPLOY_PATH }}"
          echo "║  Port    : 8000 (uvicorn)"
          echo "╚════════════════════════════════════════╝"
